version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: festimap-test-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${TEST_MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: festimap_test
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=Asia/Seoul
    volumes:
      - festimap_test_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7
    container_name: festimap-test-redis
    restart: unless-stopped
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - festimap_test_redis:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  api:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: festimap-test-api
    restart: unless-stopped
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "9998:9998"
      - "7070:7070"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: /app/config/

volumes:
  festimap_test_mysql:
  festimap_test_redis: