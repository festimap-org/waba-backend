version: "3.8"

services:

  mysql:
    image: mysql:8.0
    container_name: festimap-test-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root1234
      MYSQL_DATABASE: festimap_test
      TZ: Asia/Seoul
    command:
      - --character-set-server=utf8mb4
      - --collation-server=utf8mb4_unicode_ci
      - --default-time-zone=Asia/Seoul
    volumes:
      - festimap_test_mysql:/var/lib/mysql

  redis:
    image: redis:7
    container_name: festimap-test-redis
    restart: unless-stopped
    command: ["redis-server","--appendonly","yes"]
    volumes:
      - festimap_test_redis:/data

  api:
    image: ${IMAGE_NAME}:${IMAGE_TAG}
    container_name: festimap-test-api
    restart: unless-stopped
    depends_on:
      - mysql
      - redis
    ports:
      - "9998:9998"
      - "7070:7070"
    volumes:
      - ./config:/app/config
      - ./logs:/app/logs
    environment:
      SPRING_CONFIG_ADDITIONAL_LOCATION: /app/config/

volumes:
  festimap_test_mysql:
  festimap_test_redis: